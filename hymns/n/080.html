	<h2>新歌頌詠80【恩典彀我用】</h2>
<iframe width="560" height="315" src="https://www.youtube.com/embed/Zd1SM4vWyPc?si=TpgEJlvZDIFTCNH4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<p>一<br>
哦，我主，你旨意叫人真難測度：<br>
為何愛你的人常感覺軟弱，<br>
為何世福得不著，亨通道路未見過，<br>
為何許多患難還必須經過；<br>
多少等待都落空，禱告也無影蹤，<br>
長久苦痛卻依然在身中；<br>
原來不是你不救，忍心不顧我淚流，<br>
乃要照你旨意，不照我所求。</p>
<p>二<br>
我知道凡你所作必定是最好，<br>
我願我的心在你前常受教；<br>
不是要你刺挪去，乃是求你恩加多；<br>
主，得著我，一生惟靠恩而活；<br>
我深處已能領會，你愛同你智慧，<br>
使我甘心在此處你卑微；<br>
是的，“恩典彀我用”，抓住主話作保證，<br>
我今安枕在你能力覆庇中。</p>
