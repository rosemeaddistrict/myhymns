	<h3>诗歌第640首 我对撒但总是说不</h3>

<p>1
我对撒但总是说：‘不，’我对父神就说：‘是！’
好叫我主所有部署，全得成功不受阻。
当我这样听主号令，求主赐给我权柄，
使我满有能力圣灵，成功主永远定命。</p>
<p>2
我对撒但总是说：‘不，’我对父神就说：‘是！’
这个是我永远态度，求神施恩加保护。
不然当我实行顺服，撒但就要拦去路；
当我正在听你吩咐，主耶稣，求你看顾！</p>
<p>3
我对撒但总是说：‘不，’我对父神就说：‘是！’
我愿完全绝对顺服，不论将受如何苦。
当我与主同前时候，主若肯拯救保守，
无论甚么威胁、引诱，不会使我一回头。</p>
