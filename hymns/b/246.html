<body>
	<h2>诗歌第246首 – 荣耀的释放</h2>
<iframe width="560" height="315" src="https://www.youtube.com/embed/gmLlF399F5U?si=y5DbeAItrCrA7w6U" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<p>1<br>
罪恶的锁链，曾使我难当，<br>
我如同囚奴，挣扎枉然；<br>
但我今得着奇妙的释放，<br>
就是主耶稣打碎锁链。</p>
<p>荣耀的释放！奇妙的释放！<br>
主耶稣是我荣耀救主。<br>
我今已脱离罪恶的捆绑，<br>
从今到永远不再痛苦。</p>
<p>2<br>
脱离了肉体、邪情和私欲，<br>
脱离了嫉妒、忌恨、争竞，<br>
脱离了世界、虚荣并美誉，<br>
脱离了一切无谓人生。</p>
<p>3<br>
脱离了金钱闪耀的吸力，<br>
脱离了刚硬、雄心、己意，<br>
脱离了律法字句的绊羁；<br>
希奇的释放，哦，何希奇！</p>
