	<h2>补充本134 永活救主</h2>
<iframe width="364" height="204" src="https://www.youtube.com/embed/mGBVGYsOZZQ?si=C6-y4c5Tw2KBjEKe" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<h3>1</h3>
<p>神子耶稣为我离宝座，降世为人，历尽忧苦；<br>
舍了自己，流血救赎我，从死复活，化身那灵，<br>
作我拯救主。</p>
<p>永活救主，是我荣耀盼望，<br>
点活我灵，圣化我情；<br>
安家我心房，使我有力量，<br>
同众圣享主大爱，神丰满显明。</p>
<h3>2</h3>
<p>在主里面我获得新生，旧事已过，全都更新；<br>
爱中生活，新造何光明；生机拯救来自那灵，<br>
救恩何丰盛。</p>
<h3>3</h3>
<p>主，我爱你，愿跟随你行，奔跑赛程，讨你欢心；<br>
使我忠诚，紧联于你灵，直到路终，完全得胜，<br>
与你永相亲。</p>
